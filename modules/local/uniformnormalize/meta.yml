---
# yaml-language-server: $schema=https://raw.githubusercontent.com/nf-core/modules/master/modules/meta-schema.json
name: "uniformnormalize"
description: Normalize cellmeasurement GeoJSON features and/or OME-TIFF channel intensities across cohorts.
keywords:
  - uniform
  - normalization
  - geojson
  - batch-correction
tools:
  - "uniformnormalize":
      description: "Standalone UniFORM-style GeoJSON measurement normalization"
      homepage: "https://github.com/BioimageAnalysisCoreWEHI/uniform_batch_correction"
      documentation: "https://github.com/BioimageAnalysisCoreWEHI/uniform_batch_correction"
      tool_dev_url: "https://github.com/BioimageAnalysisCoreWEHI/uniform_batch_correction"
      doi: ""
      licence: "MIT"
      identifier: ""

input:
  - - input_file:
        type: file
        description: One or more input files (*.geojson, *.ome.tiff, *.tiff)
        pattern: "*.{geojson,tiff,tif}"

output:
  - normalized_annotations:
      - "*_uniform.geojson":
          type: file
          description: GeoJSON files with normalized measurement values
          pattern: "*_uniform.geojson"

  - normalized_images:
    - "*_uniform.ome.tiff":
      type: file
      description: OME-TIFF files with normalized channel intensities
      pattern: "*_uniform.ome.tiff"
    - "*_uniform.tiff":
      type: file
      description: TIFF files with normalized channel intensities
      pattern: "*_uniform.tiff"

  - versions:
      - "versions.yml":
          type: file
          description: File containing software versions
          pattern: "versions.yml"
